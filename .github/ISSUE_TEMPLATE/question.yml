name: Question / Usage help
description: Ask how to do something with Continuum.
title: "question: <short description>"
labels: ["question", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        > **Prefer [GitHub Discussions](https://github.com/shyftlabs/continuum/discussions) for usage questions.**
        > It's a better surface for back-and-forth and lets the community help. Use this issue form only if you're sure your question is actionable for maintainers (e.g. the docs are wrong or missing).

        Have you checked:

        - [Documentation](https://github.com/shyftlabs/continuum/blob/main/docs/index.html)
        - [Examples](https://github.com/shyftlabs/continuum/tree/main/examples)
        - [Existing discussions](https://github.com/shyftlabs/continuum/discussions)

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do, and where are you stuck?
      placeholder: |
        I'm trying to stream tokens from a ReAct agent into a FastAPI WebSocket. The runner only emits TOKEN events for the final answer — I want intermediate tool calls too.
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Code, configs, or docs you've already worked through.
      placeholder: |
        - Read `continuum-streaming` skill
        - Tried `EventType.TOOL_CALL_STARTED` but it never fires
      render: markdown

  - type: input
    id: version
    attributes:
      label: Continuum version
      placeholder: "0.2.0"

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched the docs, examples, and existing discussions before opening this.
          required: true
        - label: This is a usage question, not a bug report or feature request.
          required: true
