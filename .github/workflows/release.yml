name: Release

# Automated PyPI publish via Trusted Publishing (OIDC) — no API token required.
#
# Trigger: publishing a GitHub Release. Create a release with a tag like `v0.2.2`
# and this workflow builds, validates, and uploads the distribution to PyPI.
#
# One-time setup on PyPI (https://pypi.org/manage/project/shyftlabs-continuum/settings/publishing/):
#   add a Trusted Publisher ->
#     Owner:           shyftlabs
#     Repository:      continuum
#     Workflow name:   release.yml
#     Environment:     pypi
# (Optionally create a GitHub Environment named `pypi` with required reviewers
#  to gate every publish behind a manual approval.)

on:
  release:
    types: [published]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Verify tag matches pyproject version
        if: github.event_name == 'release'
        run: |
          PYPROJECT_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "pyproject: $PYPROJECT_VERSION | tag: $TAG_VERSION"
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag ($TAG_VERSION) does not match pyproject version ($PYPROJECT_VERSION)."
            exit 1
          fi

      - name: Build distribution
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/shyftlabs-continuum/
    permissions:
      id-token: write   # REQUIRED: mints the short-lived OIDC token for PyPI
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
