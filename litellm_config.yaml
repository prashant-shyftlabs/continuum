# LiteLLM configuration including OpenAI + Gemini + Claude models with pricing
# Pricing is per 1M tokens in USD
# LiteLLM uses this for automatic cost calculation in Langfuse callbacks

model_list:
  # OpenAI models
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
    input_cost_per_token: 0.0000005      # $0.50 per 1M tokens
    output_cost_per_token: 0.0000015     # $1.50 per 1M tokens

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
    input_cost_per_token: 0.0000025       # $2.50 per 1M tokens
    output_cost_per_token: 0.00001        # $10.00 per 1M tokens

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
    input_cost_per_token: 0.00000015      # $0.15 per 1M tokens
    output_cost_per_token: 0.0000006      # $0.60 per 1M tokens

  - model_name: gpt-4o-turbo
    litellm_params:
      model: openai/gpt-4o-turbo
    input_cost_per_token: 0.0000025       # $2.50 per 1M tokens
    output_cost_per_token: 0.00001        # $10.00 per 1M tokens

  # Google / Gemini models
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
    input_cost_per_token: 0.00000125      # $1.25 per 1M tokens
    output_cost_per_token: 0.000005      # $5.00 per 1M tokens

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
    input_cost_per_token: 0.0000001       # $0.10 per 1M tokens
    output_cost_per_token: 0.0000004      # $0.40 per 1M tokens

  - model_name: gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
    input_cost_per_token: 0.0000001       # $0.10 per 1M tokens
    output_cost_per_token: 0.0000004      # $0.40 per 1M tokens

  # Anthropic / Claude models
  - model_name: claude-haiku-4.5
    litellm_params:
      model: claude/claude-haiku-4.5
    input_cost_per_token: 0.000001        # $1.00 per 1M tokens
    output_cost_per_token: 0.000005       # $5.00 per 1M tokens

  - model_name: claude-sonnet-4.5
    litellm_params:
      model: claude/claude-sonnet-4.5
    input_cost_per_token: 0.000003        # $3.00 per 1M tokens
    output_cost_per_token: 0.000015       # $15.00 per 1M tokens

  - model_name: claude-opus-4.5
    litellm_params:
      model: claude/claude-opus-4.5
    input_cost_per_token: 0.000015        # $15.00 per 1M tokens
    output_cost_per_token: 0.000075       # $75.00 per 1M tokens

# General settings
general_settings:
  master_key: null
  database_url: null

